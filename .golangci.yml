run:
  timeout: 5m
  tests: true

# Core linter set: vet, revive, staticcheck, misspell, gocritic (diagnostic
# checks only — style and performance tags are too noisy for a young
# codebase and can be re-enabled once the surface stabilises).
# Add new linters only via a spec update so the CI gate stays predictable.
linters:
  disable-all: true
  enable:
    - govet
    - revive
    - staticcheck
    - misspell
    - gocritic

linters-settings:
  govet:
    disable:
      - fieldalignment  # too noisy for a young codebase
      - shadow         # noisy false positives in handler callbacks; govet's shadow is replaced by linters we enable per-file
  revive:
    rules:
      - name: var-naming
      - name: package-comments
      - name: exported
      - name: error-strings
      - name: error-naming
    # Stuttering names like git.GitAdapter are intentional in this project
    # (the spec names the interface GitAdapter); revive's stuttering rule
    # is disabled via the `revive` settings block below.
    severity: warning
  misspell:
    locale: US
  gocritic:
    enabled-tags:
      - diagnostic
    disabled-checks:
      - ifElseChain   # too noisy; Go's if-else chains are idiomatic in CLI handlers
      - unnamedResult # too noisy for CLI commands

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gocritic
        - revive
    - linters:
        - revive
      text: "stutters"  # git.GitAdapter is intentional per spec
    - linters:
        - staticcheck
      text: "ST1000:"  # package comments enforced by revive instead
  max-issues-per-linter: 0
  max-same-issues: 0
